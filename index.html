
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SSC PYQ Quiz</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f5f5;
        }

        .category-screen,
        .topic-screen,
        .quiz-screen,
        .results-screen {
            display: none;
            min-height: 100vh;
            padding: 20px;
        }

        .category-screen.active,
        .topic-screen.active,
        .quiz-screen.active,
        .results-screen.active {
            display: block;
        }

        h1, h2 {
            text-align: center;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            max-width: 800px;
            margin: 20px auto;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .card:hover {
            transform: translateY(-3px);
        }

        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option-item {
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
        }

        .option-item.selected {
            background: #e3f2fd;
            border-color: #2196F3;
        }

        .option-item.correct {
            background: #e8f5e9;
            border-color: #4CAF50;
        }

        .option-item.wrong {
            background: #ffebee;
            border-color: #f44336;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 15px;
        }

        .btn-primary {
            background: #2196F3;
            color: white;
        }

        .btn-success {
            background: #4CAF50;
            color: white;
        }

        .center {
            text-align: center;
        }
    </style>
</head>
<body>

<!-- Category Screen -->
<div class="category-screen active" id="categoryScreen">
    <h1>📚 SSC PYQ Quiz</h1>
    <h2>Select a Category</h2>
    <div class="grid" id="categoriesGrid"></div>
</div>

<!-- Topic Screen -->
<div class="topic-screen" id="topicScreen">
    <button onclick="goBack()">← Back</button>
    <h2 id="categoryTitle"></h2>
    <div class="grid" id="topicsList"></div>
</div>

<!-- Quiz Screen -->
<div class="quiz-screen" id="quizScreen">
    <div class="quiz-header">
        <div id="questionNum"></div>
        <div id="timerDisplay">10:00</div>
    </div>

    <div id="questionText"></div>
    <div class="options-list" id="optionsList"></div>

    <button class="btn-primary" onclick="nextQuestion()">Next</button>
</div>

<!-- Results Screen -->
<div class="results-screen center" id="resultsScreen">
    <h2>Quiz Completed 🎉</h2>
    <h3 id="scoreDisplay"></h3>
    <button class="btn-success" onclick="restart()">Back to Categories</button>
</div>

<script src="js/config.js"></script>
<script src="js/question-loader.js"></script>
<script src="js/quiz-app.js"></script>

</body>
</html>
